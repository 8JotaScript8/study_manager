{% extends 'base.html' %}

{% block content %}

<h2>Dashboard</h2>

<div class="dashboard">

    <div class="card">
        <h3>Total</h3>
        <p>{{ total_tasks }}</p>
    </div>

    <div class="card">
        <h3>Concluídas</h3>
        <p>{{ completed_tasks }}</p>
    </div>

    <div class="card">
        <h3>Pendentes</h3>
        <p>{{ pending_tasks }}</p>
    </div>

    <div class="card">
        <h3>Atrasadas</h3>
        <p>{{ late_tasks }}</p>
    </div>

</div>

<h3>Progresso</h3>

<div class="progress-bar">
    <div class="progress" style="width: {{ progress }}%;"></div>
</div>

<p>{{ progress }}%</p>

{% endblock %}
