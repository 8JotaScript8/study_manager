{% extends 'base.html' %}

{% block content %}

<div class="container">

<div class="row justify-content-center">
<div class="col-md-6 col-lg-5">

<div class="card shadow-sm rounded-4 p-4 text-center">

<h4 class="mb-3">Confirmar exclusão</h4>

<p class="text-muted">
Tem certeza que deseja deletar esse Subject:
</p>

<h5 class="mb-4">
{{ object.name }}
</h5>

<form method="post">
{% csrf_token %}

<div class="d-flex justify-content-center gap-3">

<button type="submit" class="btn btn-danger rounded-pill">
Excluir
</button>

<a href="{% url 'subjects:subject_list' %}" class="btn btn-outline-secondary rounded-pill">
Cancelar
</a>

</div>

</form>

</div>

</div>
</div>

</div>

{% endblock %}
