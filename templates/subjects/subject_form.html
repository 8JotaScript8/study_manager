{% extends 'base.html' %}

{% block content %}

<div class="row justify-content-center">
  <div class="col-md-6 col-lg-5">

    <div class="card shadow-sm rounded-4 p-4">

      <h3 class="text-center mb-4">Criar Subject</h3>

      <form method="post">
        {% csrf_token %}

        <div class="mb-3">
          <label class="form-label">Nome do Subject</label>
          {{ form.name }}
        </div>

        <button class="btn btn-dark w-100 rounded-pill">
          Salvar Subject
        </button>
        <a href="{% url 'subjects:subject_list' %}" class="btn btn-outline-secondary mt-3 w-100">
            Voltar
        </a>

      </form>

    </div>

  </div>
</div>

{% endblock %}
