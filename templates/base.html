<!DOCTYPE html>
<html>
<head> 
    <title>Study Manager</title>
    
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    
    
    <style>

        body{
            font-family: Arial, sans-serif;
            margin:40px;
        }

        nav{
            margin-bottom:20px;
        }

        .dashboard{
            display:grid;
            grid-template-columns: repeat(2, 200px);
            gap:20px;
        }

        .card{
            border:1px solid #ddd;
            padding:20px;
            text-align:center;
            border-radius:10px;
            background:#f9f9f9;
        }

        .card p{
            font-size:28px;
            font-weight:bold;
        }

        .progress-bar{
            width:300px;
            height:20px;
            background:#eee;
            border-radius:10px;
        }

        .progress{
            height:100%;
            background:#4CAF50;
            border-radius:10px;
        }

    </style>

</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container">

    <a class="navbar-brand" href="{% url 'home' %}">
      Study Manager
    </a>

    <div class="collapse navbar-collapse">

      <ul class="navbar-nav me-auto">

        {% if user.is_authenticated %}

        <li class="nav-item">
          <a class="nav-link" href="{% url 'dashboard' %}">
            Dashboard
          </a>
        </li>

        <li class="nav-item">
          <a class="nav-link" href="{% url 'task_list' %}">
            Tasks
          </a>
        </li>

        <li class="nav-item">
          <a class="nav-link" href="{% url 'subjects:subject_list' %}">
            Subjects
          </a>
        </li>

        {% endif %}

      </ul>

      <div class="d-flex align-items-center text-white">

        {% if user.is_authenticated %}

        <span class="me-3">
            Olá, {{ user.username }}
        </span>

        <form action="{% url 'logout' %}" method="post">
            {% csrf_token %}
            <button class="btn btn-outline-light btn-sm">
                Logout
            </button>
        </form>

        {% else %}

        <a class="btn btn-outline-light btn-sm me-2" href="{% url 'login' %}">
            Login
        </a>

        <a class="btn btn-light btn-sm" href="{% url 'signup' %}">
            Cadastrar
        </a>

        {% endif %}

      </div>

    </div>
  </div>
</nav>

<div class="container mt-4">
  

<h1>Study Manager</h1>
<hr>

{% block content %}
{% endblock %}

</div>

</body>
</html>
